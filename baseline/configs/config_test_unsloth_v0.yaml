# configs/config.yaml
# 1-depth 섹션만 사용 (nested 최소)

model:
  # name_or_path: "beomi/gemma-ko-2b"
  name_or_path: "skt/A.X-4.0-Light"

tokenizer:
  max_seq_length: 4096
  padding_side: "right"

train:
  train_path: "/data/ephemeral/home/ksat_data/splitted/train.csv"
  eval_path: "/data/ephemeral/home/ksat_data/splitted/valid.csv"
  output_dir: "./outputs_skt"

  # LoRA (train only)
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

  # trainer
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 5e-6
  lr_scheduler_type: "cosine"
  num_train_epochs: 1

  fp16: true
  gradient_checkpointing: "unsloth"
  seed: 42
  weight_decay: 0.01
  report_to: "wandb"  # none | wandb | tensorboard

infer:
  test_path: "/data/ephemeral/home/ksat_data/test.csv"
  output_path: "output.csv"

  # adapter_path가 null이면 {train.output_dir}/final_adapter 사용 (코드에서)
  use_adapter: true
  adapter_path: null

wandb:
  project: "koreasat_woohyun"
  entity: "hakiful-ai"
  name: "skt/A.X-4.0-Light_bsz_8_maxseq_4096_use_packing"
  group: "skt/A.X-4.0-Light"
  job_type: "train"
  notes: "full lora, unsloth 사용, 1epoch, train, bsz 8 \n\n max seq length 4096 \n\n use_packing"