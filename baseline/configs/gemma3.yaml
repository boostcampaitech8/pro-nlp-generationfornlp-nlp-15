# configs/config.yaml
# 1-depth 섹션만 사용 (nested 최소)

model:
  # name_or_path: "beomi/gemma-ko-2b"
  name_or_path: "unsloth/gemma-3-27b-it-bnb-4bit"
  load_in_4bit: true

tokenizer:
  max_seq_length: 4096
  padding_side: "right"

train:
  # train_path: "/data/ephemeral/home/ksat_data/splitted/train.csv"
  train_path: "/data/ephemeral/home/ksat_data/gold_training_data.jsonl"
  eval_path: null  # Use stratified split from train_path (CoT data)
  output_dir: "./outputs_gemma"

  # LoRA (train only)
  lora_r: 32
  lora_alpha: 64
  lora_dropout: 0
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  use_rslora: false
  use_dora: false
  neftune_noise_alpha: 5 # null or gt 0

  # trainer
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 5e-5
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  num_train_epochs: 5

  fp16: true
  gradient_checkpointing: "unsloth"
  seed: 42
  weight_decay: 0.01
  report_to: "wandb"  # none | wandb | tensorboard

infer:
  test_path: "/data/ephemeral/home/ksat_data/test.csv"
  output_path: "batch_4_lr_5e-5_loradrop_0.05_epoch_5.csv"

  # adapter_path가 null이면 {train.output_dir}/final_adapter 사용 (코드에서)
  use_adapter: true
  adapter_path: null
  
  inference_method: "logits"
  max_new_tokens: 4096

wandb:
  project: "koreasat_woohyun"
  entity: "hakiful-ai"
  name: "cot_reasoning"
  group: "unsloth/gemma-3-27b-it-bnb-4bit"
  job_type: "train"
  notes: "lora, r: 32, alpha: 64, bzs: 4, lr: 5e-5, neftune_noise_alpha: 5, epoch: 5 / use_cot"