# configs/config_baseline_compare.yaml
# baseline_custom.ipynb / train_baseline.py와 동일한 설정
# 동일 선상에서 비교하기 위한 전용 config

model:
  name_or_path: "beomi/gemma-ko-2b"

tokenizer:
  max_seq_length: 1024  # baseline과 동일
  padding_side: "right"

train:
  train_path: "/data/ephemeral/home/data/train.csv"
  output_dir: "./outputs_compare"

  # LoRA (baseline과 동일)
  lora_r: 6
  lora_alpha: 8
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "k_proj"]  # baseline: k_proj (not v_proj)

  # trainer (baseline과 동일)
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1  # baseline: gradient_accumulation 없음
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  num_train_epochs: 3  # baseline: 3 epochs

  fp16: true
  gradient_checkpointing: false
  seed: 42
  weight_decay: 0.01
  report_to: "wandb"

infer:
  test_path: "/data/ephemeral/home/data/test.csv"
  output_path: "output_compare.csv"
  use_adapter: true
  adapter_path: null

wandb:
  project: "koreasat_woohyun"
  entity: "hakiful-ai"
  name: "gemma-ko-2b-baseline-compare"
