# configs/train_config.yaml

model:
  name_or_path: "beomi/gemma-ko-2b"  # 베이스라인에서 사용한 모델명 (예시)
  
data:
  train_path: "data/train.csv"
  max_seq_length: 1024

lora:
  r: 6
  lora_alpha: 8
  lora_dropout: 0.05
  target_modules: ["q_proj", "v_proj"]
  bias : "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./outputs"          
  per_device_train_batch_size: 1        # GPU 한 장당 배치 사이즈
  per_device_eval_batch_size: 1
  # 실제 batch_size 4를 맞추기 위해 4단계 누적 (1 * 4 = 4)
  gradient_accumulation_steps: 4        
  learning_rate: 2.0e-5                 # SFTConfig 값 유지
  lr_scheduler_type: "cosine"           # SFTConfig의 코사인 스케줄러 반영
  num_train_epochs: 3                  
  
  # 최적화 및 속도 관련
  bf16: True                           
  #tf32: True                           # Blackwell 연산 최적화
  gradient_checkpointing: True          # 메모리 효율화
  
  # 로깅 및 저장 전략
  logging_steps: 1                      # SFTConfig의 1단계 로깅 반영
  evaluation_strategy: "epoch"          # 에폭마다 평가
  save_strategy: "epoch"                # 에폭마다 저장
  save_total_limit: 2                   # 체크포인트 최대 2개 유지
  
  # 기타
  seed: 42
  weight_decay: 0.01
  report_to: "none"

# WandB 관련 설정 섹션 추가
wandb:
  project: "koreasat"
  entity: "hakiful-ai"
  name: "beomi/gemma-ko-2b"  # 실행 이름 (선택)