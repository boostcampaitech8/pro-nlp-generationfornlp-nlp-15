# configs/config.yaml
# 1-depth 섹션만 사용 (nested 최소)

model:
  # name_or_path: "beomi/gemma-ko-2b"
  name_or_path: "skt/A.X-4.0-Light"

tokenizer:
  max_seq_length: 2048
  padding_side: "left"

train:
  train_path: "/data/ephemeral/home/data/train.csv"
  output_dir: "./outputs"

  # LoRA (train only)
  lora_r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "v_proj"]

  # trainer
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 5e-6
  lr_scheduler_type: "cosine"
  num_train_epochs: 5

  fp16: true
  gradient_checkpointing: false
  seed: 42
  weight_decay: 0.01
  report_to: "wandb"  # none | wandb | tensorboard

infer:
  test_path: "/data/ephemeral/home/data/test.csv"
  output_path: "output.csv"

  # adapter_path가 null이면 {train.output_dir}/final_adapter 사용 (코드에서)
  use_adapter: true
  adapter_path: null

wandb:
  project: "koreasat_yejoon"
  entity: "hakiful-ai"
  name: "skt/A.X-4.0-Light"